services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sphynx_cats_crm_bot
    env_file:
      - .env
    environment:
      # SQLite file lives in the mounted volume, not the image layer, so
      # admin/audit data survives a rebuild.
      - DB_PATH=/app/data/sphynx_crm_bot.db
    volumes:
      - ./data:/app/data
    # Uncomment if the website isn't on the same Docker network as this
    # bot (e.g. running standalone, not as part of the sphynx homelab) --
    # the site needs to reach NOTIFY_PORT to push new requests here.
    # ports:
    #   - "8080:8080"
    restart: unless-stopped
    command: python bot.py
